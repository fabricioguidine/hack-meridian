version: "3.9"
services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    environment:
      # CONTRACT_ID is required: set it to the deployed C... strkey.
      CONTRACT_ID: ${CONTRACT_ID:?set CONTRACT_ID to the deployed contract strkey}
      SOROBAN_RPC_URL: ${SOROBAN_RPC_URL:-https://soroban-testnet.stellar.org}
      PORT: "4000"
    ports:
      - "4000:4000"
    depends_on:
      - contracts

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    depends_on:
      - backend

  contracts:
    build:
      context: .
      dockerfile: docker/contracts.Dockerfile
    volumes:
      - ./contracts:/app
